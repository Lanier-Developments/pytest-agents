name: Snyk Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  snyk-python:
    name: Snyk Python Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/python@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --sarif-file-output=snyk.sarif

    - name: Upload Snyk results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('snyk.sarif') != ''
      with:
        sarif_file: snyk.sarif
        category: snyk-python

  snyk-npm:
    name: Snyk npm Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: ['pm', 'research', 'index']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20.x'

    - name: Install dependencies
      working-directory: ./${{ matrix.agent }}
      run: npm ci

    - name: Install Snyk CLI
      run: npm install -g snyk

    - name: Run Snyk to check for vulnerabilities
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        cd ${{ matrix.agent }}
        snyk test --severity-threshold=high --sarif-file-output=../snyk-${{ matrix.agent }}.sarif || true

    - name: Upload Snyk results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles(format('snyk-{0}.sarif', matrix.agent)) != ''
      with:
        sarif_file: snyk-${{ matrix.agent }}.sarif
        category: snyk-npm-${{ matrix.agent }}

  snyk-docker:
    name: Snyk Docker Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Build fresh (no layer cache, re-pull base images) so the scan evaluates
    # current packages. A cached `apk add npm && npm install -g npm@latest`
    # layer otherwise freezes an old, vulnerable global npm and reports stale
    # base-image findings that newer npm/Alpine releases have already fixed.
    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: pytest-agents:test
        no-cache: true
        pull: true

    - name: Run Snyk to check Docker image for vulnerabilities
      uses: snyk/actions/docker@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: pytest-agents:test
        args: --severity-threshold=high --sarif-file-output=snyk.sarif

    # GitHub code scanning rejects a single SARIF file containing multiple runs
    # (changelog 2025-07-21). Snyk's container scan emits one run per target
    # detected inside the image, so merge them into one valid run before upload:
    # union the rule definitions and drop the now-invalid ruleIndex references
    # (results still resolve by ruleId).
    - name: Merge Snyk multi-run SARIF into a single run
      if: always() && hashFiles('snyk.sarif') != ''
      run: |
        jq '
          .runs[0].tool.driver as $driver
          | {
              "$schema": (.["$schema"] // "https://json.schemastore.org/sarif-2.1.0.json"),
              version: (.version // "2.1.0"),
              runs: [
                {
                  tool: { driver: ($driver + { rules: ([.runs[].tool.driver.rules // [] | .[]] | unique_by(.id)) }) },
                  results: [.runs[].results // [] | .[] | del(.ruleIndex)]
                }
              ]
            }
        ' snyk.sarif > snyk-container.sarif
        echo "Merged $(jq '.runs | length' snyk.sarif) run(s) into 1; results: $(jq '.runs[0].results | length' snyk-container.sarif)"

    - name: Upload Snyk Docker results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('snyk-container.sarif') != ''
      with:
        sarif_file: snyk-container.sarif
        category: snyk-container
